<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Birthday Hunt!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a0533;
      --card: #2b0d52;
      --accent1: #ff6fd8;
      --accent2: #ffe156;
      --accent3: #5ef7c2;
      --accent4: #7eb3ff;
      --correct: #3ddc84;
      --wrong: #ff4f6d;
      --tile-bg: #3d1678;
      --tile-border: #7c3abf;
      --slot-bg: rgba(255,255,255,0.07);
      --slot-border: rgba(255,255,255,0.22);
      --text: #fff;
      --shadow: 0 4px 24px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Stars background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 85% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 15% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 820px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 16px 16px 0;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 8px rgba(255,110,216,0.4));
    }

    .level-badge {
      background: linear-gradient(135deg, #7c3abf, #4a1a8c);
      border: 2px solid var(--accent1);
      color: var(--accent1);
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      padding: 6px 18px;
      border-radius: 999px;
      box-shadow: 0 0 16px rgba(255,110,216,0.3);
    }

    /* ── HINT ── */
    .hint-bar {
      text-align: center;
      color: var(--accent3);
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 600;
      margin-bottom: 12px;
      opacity: 0.9;
      flex-shrink: 0;
    }

    /* ── PROGRESS STARS ── */
    .progress-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    .star {
      font-size: 1.5rem;
      opacity: 0.25;
      transition: opacity 0.3s, transform 0.3s;
    }
    .star.lit {
      opacity: 1;
      transform: scale(1.15);
      filter: drop-shadow(0 0 8px gold);
    }

    /* ── WORDS AREA ── */
    #words-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: clamp(12px, 2.5vw, 22px);
      overflow: hidden;
    }

    .word-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 4px;
    }

    .word-label {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(0.7rem, 2vw, 0.95rem);
      color: rgba(255,255,255,0.3);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    .slots-group {
      display: flex;
      gap: clamp(5px, 1.5vw, 10px);
    }

    .slot {
      width: clamp(46px, 10vw, 68px);
      height: clamp(46px, 10vw, 68px);
      background: var(--slot-bg);
      border: 2.5px dashed var(--slot-border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 3.5vw, 1.9rem);
      color: var(--text);
      transition: border-color 0.25s, background 0.25s, transform 0.15s, box-shadow 0.25s;
      position: relative;
      cursor: default;
    }

    .slot.drag-over {
      border-color: var(--accent2);
      background: rgba(255,225,86,0.12);
      transform: scale(1.06);
      box-shadow: 0 0 18px rgba(255,225,86,0.35);
    }

    .slot.correct {
      border-color: var(--correct);
      background: rgba(61,220,132,0.15);
      border-style: solid;
      box-shadow: 0 0 18px rgba(61,220,132,0.4);
      animation: popIn 0.3s ease;
    }

    .slot.wrong {
      border-color: var(--wrong);
      background: rgba(255,79,109,0.15);
      border-style: solid;
      box-shadow: 0 0 18px rgba(255,79,109,0.4);
      animation: shake 0.4s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.85); }
      60% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* ── TILES BANK ── */
    #tiles-bank {
      flex-shrink: 0;
      margin-top: 10px;
      padding: 14px 10px 10px;
      background: rgba(255,255,255,0.04);
      border-top: 1.5px solid rgba(255,255,255,0.08);
      display: flex;
      flex-wrap: wrap;
      gap: clamp(8px, 2vw, 14px);
      justify-content: center;
      align-items: center;
      min-height: 90px;
    }

    .tile {
      width: clamp(46px, 10vw, 68px);
      height: clamp(46px, 10vw, 68px);
      background: linear-gradient(145deg, #5a25a0, var(--tile-bg));
      border: 2.5px solid var(--tile-border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 3.5vw, 1.9rem);
      color: var(--text);
      cursor: grab;
      user-select: none;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      will-change: transform;
      position: relative;
      touch-action: none;
    }

    .tile:active, .tile.dragging {
      cursor: grabbing;
      transform: scale(1.15) rotate(-3deg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(255,110,216,0.4);
      z-index: 1000;
    }

    .tile.used {
      opacity: 0;
      pointer-events: none;
    }

    /* Tile color accents by index */
    .tile:nth-child(3n)   { border-color: var(--accent1); }
    .tile:nth-child(3n+1) { border-color: var(--accent3); }
    .tile:nth-child(3n+2) { border-color: var(--accent4); }

    /* ── NEXT LEVEL BUTTON ── */
    #next-btn {
      display: none;
      margin: 14px auto 18px;
      padding: 16px 48px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      color: var(--bg);
      background: linear-gradient(135deg, var(--accent2), var(--accent1));
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 6px 30px rgba(255,110,216,0.5);
      animation: pulse 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }

    #next-btn.show { display: block; }

    @keyframes pulse {
      0%,100% { transform: scale(1); box-shadow: 0 6px 30px rgba(255,110,216,0.5); }
      50%      { transform: scale(1.04); box-shadow: 0 10px 40px rgba(255,110,216,0.8); }
    }

    /* ── WIN SCREEN ── */
    #win-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,0,24,0.92);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      gap: 20px;
    }
    #win-screen.show { display: flex; }

    .win-emoji { font-size: 5rem; animation: bounce 0.8s ease infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

    .win-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 8vw, 3.5rem);
      background: linear-gradient(135deg, var(--accent2), var(--accent1), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .win-msg {
      color: rgba(255,255,255,0.85);
      font-size: clamp(1rem, 3vw, 1.3rem);
      max-width: 480px;
      line-height: 1.5;
    }

    /* ── GHOST TILE (drag clone) ── */
    #drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      display: none;
      width: 68px;
      height: 68px;
      background: linear-gradient(145deg, #5a25a0, var(--tile-bg));
      border: 2.5px solid var(--accent1);
      border-radius: 14px;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1.9rem;
      color: #fff;
      transform: translate(-50%, -50%) scale(1.2) rotate(-3deg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(255,110,216,0.5);
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">🎁 Birthday Hunt!</div>
    <div class="level-badge" id="level-label">Level 1</div>
  </header>
  <div class="hint-bar" id="hint-bar"></div>
  <div class="progress-row" id="progress-row"></div>
  <div id="words-area"></div>
  <div id="tiles-bank"></div>
  <button id="next-btn">Next Level ✨</button>
</div>

<div id="win-screen">
  <div class="win-emoji">🎉</div>
  <div class="win-title">YOU DID IT!</div>
  <div class="win-msg" id="win-msg">Amazing job! You solved every puzzle!</div>
</div>

<div id="drag-ghost"></div>

<script>
// ── State
let levels = [];
let currentLevel = 0;
let slots = []; // [{el, word, index, filled, correctLetter}]
let tiles = []; // [{el, letter, id}]
let dragging = null; // {tileId, letter, originEl}
let completedWords = new Set();

const ghost = document.getElementById('drag-ghost');

// ── Load levels.json
async function init() {
  try {
    const res = await fetch('levels.json');
    levels = await res.json();
  } catch(e) {
    // Fallback if can't load JSON
    levels = [
      { level:1, hint:"People and places you know!", words:["MOM","DAD","BED"] },
      { level:2, hint:"Things you might find outside...", words:["TREE","BIRD","POND"] },
      { level:3, hint:"You found them all! Ask Mom or Dad where to look!", words:["COUCH","SHELF","ATTIC"] }
    ];
  }
  buildProgressStars();
  loadLevel(0);
}

function buildProgressStars() {
  const row = document.getElementById('progress-row');
  row.innerHTML = '';
  levels.forEach((_, i) => {
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = '⭐';
    s.id = `star-${i}`;
    row.appendChild(s);
  });
}

function loadLevel(idx) {
  currentLevel = idx;
  completedWords = new Set();
  const lvl = levels[idx];

  document.getElementById('level-label').textContent = `Level ${lvl.level}/8`;
  document.getElementById('hint-bar').textContent = `💡 ${lvl.hint}`;
  document.getElementById('next-btn').classList.remove('show');

  // Build slots
  const wordsArea = document.getElementById('words-area');
  wordsArea.innerHTML = '';
  slots = [];

  // Word row colors
  const rowColors = ['var(--accent1)', 'var(--accent3)', 'var(--accent4)', 'var(--accent2)'];

  lvl.words.forEach((word, wi) => {
    const row = document.createElement('div');
    row.className = 'word-row';

    const label = document.createElement('div');
    label.className = 'word-label';
    label.textContent = `${wi+1}.`;
    row.appendChild(label);

    const group = document.createElement('div');
    group.className = 'slots-group';

    for (let i = 0; i < word.length; i++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.dataset.word = wi;
      slot.dataset.index = i;
      slot.dataset.letter = word[i];
      slot.style.setProperty('--row-color', rowColors[wi % rowColors.length]);

      // Drop events (mouse)
      slot.addEventListener('dragover', onDragOver);
      slot.addEventListener('dragleave', onDragLeave);
      slot.addEventListener('drop', onDrop);

      group.appendChild(slot);
      slots.push({ el: slot, word: wi, index: i, filled: false, correctLetter: word[i] });
    }

    row.appendChild(group);
    wordsArea.appendChild(row);
  });

  // Build shuffled tiles
  const bank = document.getElementById('tiles-bank');
  bank.innerHTML = '';
  tiles = [];

  // Collect all letters, shuffle
  let allLetters = [];
  lvl.words.forEach(w => allLetters.push(...w.split('')));
  allLetters = shuffle(allLetters);

  allLetters.forEach((letter, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.textContent = letter;
    tile.dataset.id = i;
    tile.dataset.letter = letter;
    tile.draggable = true;

    // Mouse drag
    tile.addEventListener('dragstart', onDragStart);
    tile.addEventListener('dragend', onDragEnd);

    // Touch drag
    tile.addEventListener('touchstart', onTouchStart, { passive: false });
    tile.addEventListener('touchmove', onTouchMove, { passive: false });
    tile.addEventListener('touchend', onTouchEnd);

    bank.appendChild(tile);
    tiles.push({ el: tile, letter, id: i });
  });
}

// ── Shuffle
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Mouse Drag Events
let dragTileId = null;

function onDragStart(e) {
  dragTileId = parseInt(e.target.dataset.id);
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragTileId);
  // Transparent drag image
  const blank = document.createElement('canvas');
  e.dataTransfer.setDragImage(blank, 0, 0);
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
}

function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  const slot = e.currentTarget;
  slot.classList.remove('drag-over');
  if (dragTileId === null) return;
  const tileObj = tiles.find(t => t.id === dragTileId);
  if (!tileObj) return;
  handlePlace(slot, tileObj);
  dragTileId = null;
}

// ── Touch Drag Events
let touchTile = null;
let touchOffsetX = 0;
let touchOffsetY = 0;

function onTouchStart(e) {
  e.preventDefault();
  const touch = e.touches[0];
  touchTile = e.currentTarget;
  const rect = touchTile.getBoundingClientRect();
  touchOffsetX = touch.clientX - rect.left - rect.width / 2;
  touchOffsetY = touch.clientY - rect.top - rect.height / 2;

  ghost.textContent = touchTile.dataset.letter;
  ghost.style.display = 'flex';
  ghost.style.left = touch.clientX + 'px';
  ghost.style.top = touch.clientY + 'px';
  touchTile.style.opacity = '0.3';
}

function onTouchMove(e) {
  e.preventDefault();
  if (!touchTile) return;
  const touch = e.touches[0];
  ghost.style.left = touch.clientX + 'px';
  ghost.style.top = touch.clientY + 'px';

  // Highlight slot under finger
  slots.forEach(s => s.el.classList.remove('drag-over'));
  const el = getSlotAtPoint(touch.clientX, touch.clientY);
  if (el) el.classList.add('drag-over');
}

function onTouchEnd(e) {
  e.preventDefault();
  if (!touchTile) return;
  ghost.style.display = 'none';
  touchTile.style.opacity = '';

  const touch = e.changedTouches[0];
  slots.forEach(s => s.el.classList.remove('drag-over'));
  const slotEl = getSlotAtPoint(touch.clientX, touch.clientY);

  if (slotEl) {
    const tileId = parseInt(touchTile.dataset.id);
    const tileObj = tiles.find(t => t.id === tileId);
    if (tileObj) handlePlace(slotEl, tileObj);
  }
  touchTile = null;
}

function getSlotAtPoint(x, y) {
  for (const s of slots) {
    if (s.filled) continue;
    const r = s.el.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
      return s.el;
    }
  }
  return null;
}

// ── Place Logic
function handlePlace(slotEl, tileObj) {
  const slotData = slots.find(s => s.el === slotEl);
  if (!slotData || slotData.filled) return;

  const correct = tileObj.letter === slotData.correctLetter;

  slotEl.textContent = tileObj.letter;
  slotEl.classList.remove('correct', 'wrong');

  if (correct) {
    slotEl.classList.add('correct');
    slotData.filled = true;
    tileObj.el.classList.add('used');
    checkWordComplete(slotData.word);
  } else {
    slotEl.classList.add('wrong');
    // Shake and reset
    setTimeout(() => {
      slotEl.textContent = '';
      slotEl.classList.remove('wrong');
    }, 600);
  }
}

function checkWordComplete(wordIdx) {
  const wordSlots = slots.filter(s => s.word === wordIdx);
  if (wordSlots.every(s => s.filled)) {
    completedWords.add(wordIdx);
    checkLevelComplete();
  }
}

function checkLevelComplete() {
  const lvl = levels[currentLevel];
  if (completedWords.size === lvl.words.length) {
    // Light up star
    const star = document.getElementById(`star-${currentLevel}`);
    if (star) star.classList.add('lit');

    if (currentLevel + 1 >= levels.length) {
      // All done!
      setTimeout(() => {
        document.getElementById('win-msg').textContent =
          '🎂 Amazing job! You solved every puzzle! Now go find your presents! 🎁';
        document.getElementById('win-screen').classList.add('show');
      }, 600);
    } else {
      document.getElementById('next-btn').classList.add('show');
    }
  }
}

// ── Next Level button
document.getElementById('next-btn').addEventListener('click', () => {
  if (currentLevel + 1 < levels.length) {
    loadLevel(currentLevel + 1);
  }
});

// ── Start
init();
</script>
</body>
</html>
